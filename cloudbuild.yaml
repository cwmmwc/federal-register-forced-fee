steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/federal-register-app:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/federal-register-app:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'federal-register-app'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/federal-register-app:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - 'lunar-mercury-397321:us-east1:allotment-db'
      - '--set-env-vars'
      - 'DATABASE_URL=host=/cloudsql/lunar-mercury-397321:us-east1:allotment-db dbname=allotment_research user=appuser password=allotment-app-2026'
      - '--memory'
      - '512Mi'
timeout: '1200s'
options:
  logging: CLOUD_LOGGING_ONLY
